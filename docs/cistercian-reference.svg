<svg xmlns="http://www.w3.org/2000/svg" width="290" height="545" viewBox="0 0 290 545">
  <rect width="290" height="545" fill="white"/>

  <!-- ── Section 1: Digit reference ─────────────────────────────── -->
  <text x="145" y="26" font-family="sans-serif" font-size="13" font-weight="bold"
        text-anchor="middle" fill="#222">Cistercian Digits 1–9</text>
  <text x="145" y="41" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#777">(shown in upper-right / units position)</text>

  <!-- Cell backgrounds -->
  <rect x="5"   y="48" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="101" y="48" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="197" y="48" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="5"   y="160" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="101" y="160" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="197" y="160" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="5"   y="272" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="101" y="272" width="88" height="105" rx="4" fill="#f7f7f7"/>
  <rect x="197" y="272" width="88" height="105" rx="4" fill="#f7f7f7"/>

  <!-- ── ROW 0 ── cx: 49, 145, 241 · stave top=55 bottom=125 · TL/TR/BL/BR offsets: (0,0),(+21,0),(0,+21),(+21,+21) -->

  <!-- Digit 1 — TL→TR -->
  <line x1="49"  y1="55"  x2="49"  y2="125" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49"  y1="55"  x2="70"  y2="55"  stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="49"  y="143" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">1</text>

  <!-- Digit 2 — BL→BR -->
  <line x1="145" y1="55"  x2="145" y2="125" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="76"  x2="166" y2="76"  stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="145" y="143" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">2</text>

  <!-- Digit 3 — TL→BR -->
  <line x1="241" y1="55"  x2="241" y2="125" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="241" y1="55"  x2="262" y2="76"  stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="241" y="143" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">3</text>

  <!-- ── ROW 1 ── stave top=167 bottom=237 -->

  <!-- Digit 4 — BL→TR -->
  <line x1="49"  y1="167" x2="49"  y2="237" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49"  y1="188" x2="70"  y2="167" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="49"  y="255" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">4</text>

  <!-- Digit 5 — TL→TR + BL→TR -->
  <line x1="145" y1="167" x2="145" y2="237" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="167" x2="166" y2="167" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="188" x2="166" y2="167" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="145" y="255" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">5</text>

  <!-- Digit 6 — TR→BR -->
  <line x1="241" y1="167" x2="241" y2="237" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="262" y1="167" x2="262" y2="188" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="241" y="255" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">6</text>

  <!-- ── ROW 2 ── stave top=279 bottom=349 -->

  <!-- Digit 7 — TL→TR + TR→BR -->
  <line x1="49"  y1="279" x2="49"  y2="349" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49"  y1="279" x2="70"  y2="279" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70"  y1="279" x2="70"  y2="300" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="49"  y="367" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">7</text>

  <!-- Digit 8 — BL→BR + TR→BR -->
  <line x1="145" y1="279" x2="145" y2="349" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="300" x2="166" y2="300" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="166" y1="279" x2="166" y2="300" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="145" y="367" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">8</text>

  <!-- Digit 9 — TL→TR + BL→BR + TR→BR -->
  <line x1="241" y1="279" x2="241" y2="349" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="241" y1="279" x2="262" y2="279" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="241" y1="300" x2="262" y2="300" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="262" y1="279" x2="262" y2="300" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="241" y="367" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">9</text>

  <!-- Zero note -->
  <text x="145" y="393" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#777">0 = stave only, no additional marks</text>

  <!-- ── Section divider ─────────────────────────────────────────── -->
  <line x1="15" y1="407" x2="275" y2="407" stroke="#ddd" stroke-width="1"/>

  <!-- ── Section 2: Quadrant positions ──────────────────────────── -->
  <text x="145" y="427" font-family="sans-serif" font-size="13" font-weight="bold"
        text-anchor="middle" fill="#222">Quadrant Positions</text>

  <!-- Zone backgrounds: cx=145, top=445, halfH=22, bottom=520 -->
  <rect x="145" y="445" width="22" height="22" fill="#ddeeff" rx="2"/>  <!-- units   upper-right -->
  <rect x="123" y="445" width="22" height="22" fill="#ffeedd" rx="2"/>  <!-- tens    upper-left  -->
  <rect x="145" y="498" width="22" height="22" fill="#ddeeff" rx="2"/>  <!-- hundreds lower-right -->
  <rect x="123" y="498" width="22" height="22" fill="#ffeedd" rx="2"/>  <!-- thousands lower-left -->

  <!-- Stave -->
  <line x1="145" y1="445" x2="145" y2="520" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Zone boundary dashes -->
  <line x1="108" y1="467" x2="182" y2="467" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="108" y1="498" x2="182" y2="498" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <text x="171" y="459" font-family="sans-serif" font-size="11" fill="#226" font-style="italic">units</text>
  <text x="119" y="459" font-family="sans-serif" font-size="11" text-anchor="end" fill="#640" font-style="italic">tens</text>
  <text x="171" y="513" font-family="sans-serif" font-size="11" fill="#226" font-style="italic">hundreds</text>
  <text x="119" y="513" font-family="sans-serif" font-size="11" text-anchor="end" fill="#640" font-style="italic">thousands</text>

  <!-- Widget mapping note -->
  <text x="145" y="536" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#555">Blue glyph: month (100s/1000s) · day (1s/10s)</text>
  <text x="145" y="548" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#555">Red glyph: hour (100s/1000s) · minute (1s/10s)</text>
</svg>
